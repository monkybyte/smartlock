<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>SmartLock</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:      #0a0a0f;
      --surface: #12121a;
      --border:  #1e1e2e;
      --accent:  #4ade80;
      --accent2: #22d3ee;
      --danger:  #f87171;
      --warn:    #fbbf24;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --mono:    'Space Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }

    #app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 90px; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 0;
    }
    .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: .15em; text-transform: uppercase; }
    .logo span { color: var(--muted); }
    .sync-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 6px; transition: color .2s; }
    .sync-btn:hover { color: var(--accent2); }
    .sync-btn.spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Offline bar */
    .offline-bar {
      display: flex; align-items: center; gap: 8px;
      background: #fbbf2412; border: 1px solid #fbbf2430;
      border-radius: 10px; margin: 12px 16px 0;
      padding: 9px 14px; font-size: 12px; color: var(--warn);
    }

    /* Tab nav */
    nav {
      display: flex; gap: 2px; margin: 16px 16px 0;
      background: var(--surface); border-radius: 12px;
      padding: 4px; border: 1px solid var(--border);
    }
    nav button {
      flex: 1; background: none; border: none;
      color: var(--muted); font-family: var(--sans);
      font-size: 13px; font-weight: 500;
      padding: 8px 4px; border-radius: 9px;
      cursor: pointer; transition: all .2s;
    }
    nav button.active { background: var(--border); color: var(--text); }

    /* Sections */
    section { display: none; padding: 12px 16px; }
    section.active { display: block; }

    /* Lock card */
    .lock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 20px;
      margin-bottom: 12px;
      position: relative; overflow: hidden;
      transition: border-color .3s;
    }
    .lock-card.open { border-color: #4ade8060; }
    .lock-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0; transition: opacity .3s;
    }
    .lock-card.open::before { opacity: 1; }

    .lock-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .lock-name { font-size: 17px; font-weight: 600; }
    .lock-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .lock-badge { font-family: var(--mono); font-size: 10px; color: var(--muted); background: var(--border); padding: 3px 8px; border-radius: 20px; }

    .status-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; min-height: 20px; font-family: var(--mono); font-size: 12px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
    .dot.open    { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .dot.error   { background: var(--danger); }
    .dot.working { background: var(--warn); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .expiry-label { font-size: 11px; color: var(--muted); margin-bottom: 14px; font-family: var(--mono); }
    .expiry-label.warn { color: var(--warn); }
    .expiry-label.expired { color: var(--danger); }

    .expiry-bar { height: 3px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 12px; }
    .expiry-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width .5s; }
    .expiry-fill.warn { background: var(--warn); }
    .expiry-fill.expired { background: var(--danger); }

    .btn-row { display: flex; gap: 8px; }
    .btn-unlock {
      flex: 1;
      background: linear-gradient(135deg, #166534, #15803d);
      color: #dcfce7; border: 1px solid #22c55e44;
      border-radius: 12px; padding: 14px;
      font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: .08em;
      cursor: pointer; transition: all .2s;
    }
    .btn-unlock:hover { background: linear-gradient(135deg, #15803d, #16a34a); transform: translateY(-1px); }
    .btn-unlock:active { transform: none; }
    .btn-unlock:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-sync {
      background: var(--border); color: var(--accent2);
      border: 1px solid #0e7490; border-radius: 12px;
      padding: 14px 15px; cursor: pointer; font-size: 16px; transition: all .2s;
    }
    .btn-sync:hover { background: #0c4a6e44; }

    /* Log */
    .log-entry { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .log-entry:last-child { border: none; }
    .log-name  { font-weight: 500; }
    .log-lock  { font-size: 11px; color: var(--accent2); margin-top: 2px; }
    .log-time  { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* Login */
    .login-wrap { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box  { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; }
    .login-logo { font-family: var(--mono); font-size: 20px; color: var(--accent); text-align: center; margin-bottom: 6px; letter-spacing: .1em; }
    .login-sub  { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 32px; }

    .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; margin-top: 14px; }
    .field input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      color: var(--text); font-family: var(--sans); font-size: 14px;
      outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent2); }

    .btn-main {
      width: 100%; margin-top: 18px;
      background: linear-gradient(135deg, #166534, #15803d);
      color: #dcfce7; border: 1px solid #22c55e44;
      border-radius: 12px; padding: 14px;
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: .08em; transition: all .2s;
    }
    .btn-main:hover { background: linear-gradient(135deg, #15803d, #16a34a); }
    .btn-main:disabled { opacity: .5; cursor: not-allowed; }

    .err-msg {
      background: #f8717112; border: 1px solid #f8717130;
      border-radius: 10px; padding: 11px 14px;
      font-size: 13px; color: var(--danger); margin-top: 12px;
    }

    /* Bottom tabs */
    .bottom-tabs {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      display: flex;
      background: #0a0a0fee; backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    }
    .tab-btn {
      flex: 1; background: none; border: none;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; padding: 6px;
      color: var(--muted); font-size: 10px; font-family: var(--sans);
      transition: color .2s;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn svg { width: 22px; height: 22px; stroke-width: 1.6; }

    /* Toast */
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 20px;
      font-size: 13px; white-space: nowrap;
      opacity: 0; transition: all .3s; pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Flash */
    .flash {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, #4ade8033, transparent 70%);
      opacity: 0; z-index: 50; transition: opacity .15s;
    }
    .flash.show { opacity: 1; }

    /* Empty */
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; opacity: .35; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<div class="flash" id="flash"></div>
<div id="toast"></div>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════════
//  KONFIGURASJON – endre til der PocketBase kjører
// ════════════════════════════════════════════════════════════
const BACKEND_URL = 'http://127.0.0.1:8090';

// BLE UUIDs
const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const MAIN_CHAR    = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
const STATUS_CHAR  = 'cba1d466-344c-4be3-ab3f-189f80dd7518';

// ── State ─────────────────────────────────────────────────────
let state = {
  token:    localStorage.getItem('user_token'),
  userId:   localStorage.getItem('user_id'),
  tab:      'locks',
  syncing:  false,
  online:   navigator.onLine,
  tokens:   JSON.parse(localStorage.getItem('sl_tokens') || '[]'),
  log:      JSON.parse(localStorage.getItem('sl_log') || '[]'),
  statuses: {},
};

// ── API ───────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (state.token) opts.headers['Authorization'] = `Bearer ${state.token}`;
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(`${BACKEND_URL}/api/${path}`, opts);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.message || 'API-feil');
  return json;
}

// ── Auth ──────────────────────────────────────────────────────
async function login(email, password) {
  const data = await api('POST', 'collections/users/auth-with-password', { identity: email, password });
  state.token  = data.token;
  state.userId = data.record?.id;
  localStorage.setItem('user_token', data.token);
  localStorage.setItem('user_id', data.record?.id);
  await syncTokens();
  render();
}

function logout() {
  state.token = null; state.userId = null; state.tokens = [];
  localStorage.removeItem('user_token'); localStorage.removeItem('user_id');
  localStorage.removeItem('sl_tokens');
  render();
}

// ── Sync tokens fra server ────────────────────────────────────
async function syncTokens() {
  if (!state.token || !navigator.onLine) return;
  state.syncing = true; render();
  try {
    // Hent aktive tilganger for denne brukeren
    const res = await api('GET',
      `collections/access/records?filter=(user="${state.userId}"&&active=true)&expand=lock&perPage=100`
    );
    const accesses = res.items || [];
    const now = Math.floor(Date.now() / 1000);

    // Hent signerte tokens fra serveren
    const tokens = [];
    for (const a of accesses) {
      const expiry = Math.floor(new Date(a.valid_until).getTime() / 1000);
      if (expiry < now) continue; // hopp over utløpte

      // Be serveren om signert token
      const tokenRes = await api('POST', 'collections/access/records/' + a.id + '/sign', {});
      if (tokenRes.payload && tokenRes.signature) {
        tokens.push({
          lockId:    a.expand?.lock?.lock_id,
          lockName:  a.expand?.lock?.name,
          payload:   tokenRes.payload,
          signature: tokenRes.signature,
          expiresAt: a.valid_until,
        });
      }
    }

    state.tokens = tokens;
    localStorage.setItem('sl_tokens', JSON.stringify(tokens));
    toast(`✓ ${tokens.length} nøkkel${tokens.length !== 1 ? 'er' : ''} synkronisert`);
  } catch(e) {
    toast('Sync feil: ' + e.message);
  }
  state.syncing = false;
  render();
}

// ── Helpers ───────────────────────────────────────────────────
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function flash() {
  const el = document.getElementById('flash');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 600);
}

function expiryInfo(expiresAt) {
  const left = new Date(expiresAt) - Date.now();
  const secs = Math.floor(left / 1000);
  if (secs <= 0) return { label: 'Utløpt', cls: 'expired', pct: 0 };
  const h = Math.floor(secs / 3600);
  const d = Math.floor(secs / 86400);
  return {
    label: d > 0 ? `${d}d igjen` : `${h}t igjen`,
    cls:   secs < 3600 ? 'warn' : '',
    pct:   Math.min(100, (secs / 86400) * 100),
  };
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString('nb-NO', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function setStatus(lockId, cls, label) {
  state.statuses[lockId] = { cls, label };
  render();
}

// ── BLE ───────────────────────────────────────────────────────
async function disconnectAndForget(device) {
  try { if (device.gatt.connected) await device.gatt.disconnect(); } catch {}
  try { await device.forget(); } catch {}
}

async function doUnlock(token) {
  const lockId = token.lockId;
  if (!navigator.bluetooth) { toast('Web Bluetooth ikke støttet – bruk Chrome eller Bluefy'); return; }

  const exp = new Date(token.expiresAt);
  if (exp < new Date()) { setStatus(lockId, 'error', '⏰ Utløpt'); toast('Nøkkelen er utløpt – synkroniser'); return; }

  let device = null;
  try {
    setStatus(lockId, 'working', 'Søker etter lås…');
    device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
    device.addEventListener('gattserverdisconnected', () => {
      if (!device._done) setStatus(lockId, 'error', 'Mistet tilkobling');
    });

    setStatus(lockId, 'working', 'Kobler til…');
    let server;
    try { server = await device.gatt.connect(); }
    catch { await new Promise(r => setTimeout(r, 800)); server = await device.gatt.connect(); }

    const service  = await server.getPrimaryService(SERVICE_UUID);
    const mainChar = await service.getCharacteristic(MAIN_CHAR);

    let statusChar;
    try { statusChar = await service.getCharacteristic(STATUS_CHAR); await statusChar.startNotifications(); } catch {}

    setStatus(lockId, 'working', 'Sender nøkkel…');
    const data = `${token.payload}|${token.signature}`;
    await mainChar.writeValue(new TextEncoder().encode(data));

    const result = await new Promise(resolve => {
      if (!statusChar) { setTimeout(() => resolve('OPEN'), 1500); return; }
      const done = ['OPEN','CLOSED','INVALID_SIG','EXPIRED','WRONG_LOCK','FORMAT_ERR'];
      statusChar.addEventListener('characteristicvaluechanged', e => {
        const msg = new TextDecoder().decode(e.target.value).trim();
        setStatus(lockId, 'working', msg);
        if (done.includes(msg)) resolve(msg);
      });
      setTimeout(() => resolve('TIMEOUT'), 8000);
    });

    device._done = true;
    await disconnectAndForget(device);

    if (result === 'OPEN') {
      setStatus(lockId, 'open', '✓ Åpnet!');
      flash();
      const logEntry = { lockId: token.lockId, lockName: token.lockName, ts: Date.now() };
      state.log.unshift(logEntry);
      state.log = state.log.slice(0, 100);
      localStorage.setItem('sl_log', JSON.stringify(state.log));
      setTimeout(() => setStatus(lockId, '', 'Klar'), 3500);
    } else {
      const msgs = { INVALID_SIG:'Ugyldig signatur', EXPIRED:'Utløpt', WRONG_LOCK:'Feil lås', TIMEOUT:'Tidsavbrudd' };
      setStatus(lockId, 'error', msgs[result] || result);
    }
  } catch(e) {
    if (device) { device._done = true; await disconnectAndForget(device); }
    const msg = e.name === 'NotFoundError' ? 'Ingen lås funnet' :
                e.name === 'NetworkError'  ? 'Tilkobling feilet' : e.message;
    setStatus(lockId, 'error', msg);
    toast('⚠️ ' + msg);
  }
}

async function doTimeSync(lockId) {
  if (!navigator.bluetooth) return;
  try {
    setStatus(lockId, 'working', 'Kobler til…');
    const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const char    = await service.getCharacteristic(MAIN_CHAR);
    const ts      = Math.floor(Date.now() / 1000);
    await char.writeValue(new TextEncoder().encode(`TIMESYNC:${ts}`));
    setStatus(lockId, '', '✓ Tid synkronisert');
    setTimeout(async () => { try { await device.gatt.disconnect(); } catch {} setStatus(lockId, '', 'Klar'); }, 1500);
  } catch(e) { setStatus(lockId, 'error', 'Sync feilet'); }
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML = '';

  if (!state.token) { app.appendChild(renderLogin()); return; }

  // Header
  const header = document.createElement('div');
  header.className = 'header';
  header.innerHTML = `<div class="logo">Smart<span>Lock</span></div>`;
  const syncBtn = document.createElement('button');
  syncBtn.className = `sync-btn ${state.syncing ? 'spin' : ''}`;
  syncBtn.textContent = '↻';
  syncBtn.title = 'Synkroniser';
  syncBtn.addEventListener('click', syncTokens);
  header.appendChild(syncBtn);
  app.appendChild(header);

  // Offline bar
  if (!state.online) {
    const bar = document.createElement('div');
    bar.className = 'offline-bar';
    bar.innerHTML = '⚠️ Offline – bruker lagrede nøkler';
    app.appendChild(bar);
  }

  // Tabs
  const nav = document.createElement('nav');
  [['locks','🔒 Låser'],['log','📋 Logg'],['profile','👤 Profil']].forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    if (state.tab === id) btn.className = 'active';
    btn.addEventListener('click', () => { state.tab = id; render(); });
    nav.appendChild(btn);
  });
  app.appendChild(nav);

  // Sections
  const locks   = document.createElement('section');
  const log     = document.createElement('section');
  const profile = document.createElement('section');

  locks.className   = `${state.tab === 'locks'   ? 'active' : ''}`;
  log.className     = `${state.tab === 'log'     ? 'active' : ''}`;
  profile.className = `${state.tab === 'profile' ? 'active' : ''}`;

  locks.innerHTML   = renderLocks();
  log.innerHTML     = renderLog();
  profile.innerHTML = renderProfile();

  app.appendChild(locks);
  app.appendChild(log);
  app.appendChild(profile);

  // Attach unlock button events
  document.querySelectorAll('[data-unlock]').forEach(btn => {
    const idx = parseInt(btn.dataset.unlock);
    btn.addEventListener('click', () => doUnlock(state.tokens[idx]));
  });
  document.querySelectorAll('[data-sync]').forEach(btn => {
    btn.addEventListener('click', () => doTimeSync(btn.dataset.sync));
  });
  document.getElementById('logout-btn')?.addEventListener('click', logout);
  document.getElementById('sync-btn-profile')?.addEventListener('click', syncTokens);

  // Bottom tabs
  const bottomTabs = document.createElement('nav');
  bottomTabs.className = 'bottom-tabs';
  bottomTabs.innerHTML = `
    <button class="tab-btn ${state.tab==='locks'?'active':''}" data-tab="locks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Låser
    </button>
    <button class="tab-btn ${state.tab==='log'?'active':''}" data-tab="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Logg
    </button>
    <button class="tab-btn ${state.tab==='profile'?'active':''}" data-tab="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profil
    </button>`;
  bottomTabs.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); });
  });
  app.appendChild(bottomTabs);
}

function renderLocks() {
  if (state.tokens.length === 0) return `
    <div class="empty fade-in">
      <div class="empty-icon">🔒</div>
      <p>Ingen nøkler tilgjengelig.<br>Administrator må tildele deg tilgang,<br>og du må synkronisere (↻) for å hente dem.</p>
    </div>`;

  return state.tokens.map((t, i) => {
    const st  = state.statuses[t.lockId] || { cls: '', label: 'Klar' };
    const exp = expiryInfo(t.expiresAt);
    const dotCls    = st.cls === 'open' ? 'open' : st.cls === 'working' ? 'working' : st.cls === 'error' ? 'error' : '';
    const txtColor  = st.cls === 'open' ? 'var(--accent)' : st.cls === 'working' ? 'var(--warn)' : st.cls === 'error' ? 'var(--danger)' : 'var(--muted)';
    const isWorking = st.cls === 'working';
    return `
    <div class="lock-card ${st.cls === 'open' ? 'open' : ''} fade-in">
      <div class="lock-head">
        <div>
          <div class="lock-name">${t.lockName || t.lockId}</div>
          <div class="lock-sub">${t.lockId}</div>
        </div>
        <span class="lock-badge">${t.lockId}</span>
      </div>
      <div class="status-row">
        <div class="dot ${dotCls}"></div>
        <span style="color:${txtColor}">${st.label}</span>
      </div>
      <div class="expiry-label ${exp.cls}">${exp.label}</div>
      <div class="btn-row">
        <button class="btn-unlock" data-unlock="${i}" ${isWorking ? 'disabled' : ''}>
          ${isWorking ? '···' : '🔓  LÅS OPP'}
        </button>
        <button class="btn-sync" data-sync="${t.lockId}" title="Synkroniser klokke">🕐</button>
      </div>
      <div class="expiry-bar"><div class="expiry-fill ${exp.cls}" style="width:${exp.pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderLog() {
  if (state.log.length === 0) return `<div class="empty"><div class="empty-icon">📋</div><p>Ingen aktivitet ennå</p></div>`;
  return state.log.map(e => `
    <div class="log-entry">
      <div>
        <div class="log-name">${e.lockName || e.lockId}</div>
        <div class="log-lock">${e.lockId}</div>
      </div>
      <div class="log-time">${fmtTime(e.ts)}</div>
    </div>`).join('');
}

function renderProfile() {
  return `
    <div class="lock-card fade-in" style="position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:.4"></div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Innlogget</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:4px">${state.userId || '–'}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:20px">${state.tokens.length} nøkkel${state.tokens.length !== 1 ? 'er' : ''} lagret offline</div>
      <button id="sync-btn-profile" style="width:100%;background:var(--border);color:var(--text);border:none;border-radius:12px;padding:13px;cursor:pointer;font-size:14px;margin-bottom:10px">↻ Synkroniser nøkler</button>
      <button id="logout-btn" style="width:100%;background:#f8717110;color:var(--danger);border:1px solid #f8717130;border-radius:12px;padding:13px;cursor:pointer;font-size:14px">Logg ut</button>
    </div>`;
}

function renderLogin() {
  const wrap = document.createElement('div');
  wrap.className = 'login-wrap';
  wrap.innerHTML = `
    <div class="login-box fade-in">
      <div class="login-logo">Smart<span style="color:var(--muted)">Lock</span></div>
      <div class="login-sub">Logg inn for å åpne låsene dine</div>
      <div id="lerr"></div>
      <div class="field"><label>E-post</label><input id="lemail" type="email" placeholder="din@epost.no" autocomplete="email"></div>
      <div class="field"><label>Passord</label><input id="lpass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-main" id="lbtn">Logg inn</button>
    </div>`;

  setTimeout(() => {
    document.getElementById('lbtn')?.addEventListener('click', async () => {
      const email = document.getElementById('lemail')?.value;
      const pass  = document.getElementById('lpass')?.value;
      const btn   = document.getElementById('lbtn');
      const err   = document.getElementById('lerr');
      btn.disabled = true; btn.textContent = '···';
      try { await login(email, pass); }
      catch(e) {
        err.innerHTML = `<div class="err-msg">${e.message}</div>`;
        btn.disabled = false; btn.textContent = 'Logg inn';
      }
    });
    document.getElementById('lemail')?.focus();
  }, 0);
  return wrap;
}

// ── Events ────────────────────────────────────────────────────
window.addEventListener('online',  () => { state.online = true;  syncTokens(); render(); });
window.addEventListener('offline', () => { state.online = false; render(); });
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.token && navigator.onLine) syncTokens();
});

// ── Service Worker ─────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

// ── Init ──────────────────────────────────────────────────────
render();
if (state.token && navigator.onLine) syncTokens();
</script>
</body>
</html>

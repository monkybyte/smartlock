<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLock</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        button { padding: 15px 25px; font-size: 16px; cursor: pointer; margin: 10px; border-radius: 8px; border: none; background: #007bff; color: white; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>MonkyByte SmartLock</h1>
    
    <button id="connectBtn">Koble til lås</button>
    <button id="unlockBtn" disabled>Lås opp</button>

    <div id="status">Status: Frakoblet</div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const unlockBtn = document.getElementById('unlockBtn');
        const statusDiv = document.getElementById('status');

        let connectedDevice = null;

        // Funksjon for å oppdatere UI
        function updateUI(connected) {
            if (connected) {
                statusDiv.innerText = "Status: Tilkoblet ✅";
                connectBtn.innerText = "Koble fra";
                unlockBtn.disabled = false;
            } else {
                statusDiv.innerText = "Status: Frakoblet ❌";
                connectBtn.innerText = "Koble til lås";
                unlockBtn.disabled = true;
            }
        }

        // Forsøk å finne tidligere koblede enheter når siden lastes
        async function checkExistingConnections() {
            if (navigator.bluetooth && navigator.bluetooth.getDevices) {
                const devices = await navigator.bluetooth.getDevices();
                if (devices.length > 0) {
                    statusDiv.innerText = "Status: Fant lagret lås. Trykk koble til.";
                    // Vi kan ikke koble til automatisk uten et klikk, 
                    // men vi vet nå at vi slipper å søke på nytt.
                }
            }
        }

        async function handleConnect() {
            try {
                if (connectedDevice && connectedDevice.gatt.connected) {
                    await connectedDevice.gatt.disconnect();
                    updateUI(false);
                    return;
                }

                statusDiv.innerText = "Kobler til...";

                // 1. Sjekk om vi allerede har tilgang til enheten
                const devices = await navigator.bluetooth.getDevices();
                let device = devices[0]; // Tar den første lagrede enheten

                // 2. Hvis ingen lagret enhet, start nytt søk
                if (!device) {
                    device = await navigator.bluetooth.requestDevice({
                        filters: [{ namePrefix: 'SmartLock' }], // ENDRE DETTE til navnet på din lås
                        optionalServices: ['battery_service'] // Legg til dine UUIDs her
                    });
                }

                // 3. Koble til
                const server = await device.gatt.connect();
                connectedDevice = device;
                
                updateUI(true);

                // Lytt etter hvis enheten kobler ut (f.eks. går tom for strøm)
                device.addEventListener('gattserverdisconnected', () => updateUI(false));

            } catch (error) {
                console.error("Feil:", error);
                statusDiv.innerText = "Feil: " + error.message;
            }
        }

        async function handleUnlock() {
            if (!connectedDevice) return;
            
            statusDiv.innerText = "Låser opp...";
            // HER må du legge inn din spesifikke logikk for å skrive til Bluetooth-karakteristikken
            // f.eks: characteristic.writeValue(new Uint8Array([1]));
            
            setTimeout(() => { statusDiv.innerText = "Status: Tilkoblet ✅"; }, 2000);
        }

        connectBtn.addEventListener('click', handleConnect);
        unlockBtn.addEventListener('click', handleUnlock);
        
        // Sjekk ved oppstart
        checkExistingConnections();

    </script>
</body>
</html>

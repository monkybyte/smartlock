<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>SmartLock</title>
  <link rel="manifest" href="manifest.json">

  <!-- SubtleCrypto er innebygd i alle moderne nettlesere – ingen CDN-avhengighet -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #1e1e2e;
      --accent:   #4ade80;
      --accent2:  #22d3ee;
      --danger:   #f87171;
      --warn:     #fbbf24;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --mono:     'Space Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ── Layout ── */
    #app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

    /* ── Top bar ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 0;
    }
    .logo {
      font-family: var(--mono); font-size: 13px; letter-spacing: 0.15em;
      color: var(--accent); text-transform: uppercase;
    }
    .logo span { color: var(--muted); }
    #clock {
      font-family: var(--mono); font-size: 12px; color: var(--muted);
      min-width: 55px; text-align: right;
    }

    /* ── Tab nav ── */
    nav {
      display: flex; gap: 2px;
      margin: 20px 20px 0;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      border: 1px solid var(--border);
    }
    nav button {
      flex: 1; background: none; border: none;
      color: var(--muted); font-family: var(--sans); font-size: 13px; font-weight: 500;
      padding: 8px 4px; border-radius: 9px; cursor: pointer;
      transition: all 0.2s;
    }
    nav button.active {
      background: var(--border); color: var(--text);
    }

    /* ── Sections ── */
    section { display: none; padding: 16px 20px; }
    section.active { display: block; }

    /* ── Lock card ── */
    .lock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
      transition: border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    .lock-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .lock-card:has(.btn-unlock:hover)::before { opacity: 1; }

    .lock-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px;
    }
    .lock-name {
      font-size: 17px; font-weight: 600;
    }
    .lock-id-badge {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      background: var(--border); padding: 3px 8px; border-radius: 20px;
    }
    .lock-meta {
      font-size: 12px; color: var(--muted); margin-top: 3px;
    }

    .lock-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-family: var(--mono);
      margin-bottom: 14px;
      min-height: 20px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.open    { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-dot.error   { background: var(--danger); }
    .status-dot.working { background: var(--warn); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .lock-actions { display: flex; gap: 8px; }

    .btn-unlock {
      flex: 1;
      background: linear-gradient(135deg, #166534 0%, #15803d 100%);
      color: #dcfce7;
      border: 1px solid #22c55e44;
      border-radius: 12px;
      padding: 13px;
      font-family: var(--mono); font-size: 13px; letter-spacing: 0.08em;
      cursor: pointer; transition: all 0.2s;
      font-weight: 700;
    }
    .btn-unlock:hover { background: linear-gradient(135deg, #15803d 0%, #16a34a 100%); transform: translateY(-1px); }
    .btn-unlock:active { transform: translateY(0); }
    .btn-unlock:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-sync {
      background: var(--border);
      color: var(--accent2);
      border: 1px solid #0e7490;
      border-radius: 12px; padding: 13px 14px;
      cursor: pointer; font-size: 16px; transition: all 0.2s;
    }
    .btn-sync:hover { background: #0c4a6e44; }

    .btn-del-lock {
      background: none; border: none;
      color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 0 4px; transition: color 0.2s;
    }
    .btn-del-lock:hover { color: var(--danger); }

    .expiry-bar {
      margin-top: 12px;
      background: var(--border);
      border-radius: 4px; height: 3px; overflow: hidden;
    }
    .expiry-fill {
      height: 100%; border-radius: 4px;
      background: var(--accent);
      transition: width 0.5s;
    }
    .expiry-fill.warn  { background: var(--warn); }
    .expiry-fill.expired { background: var(--danger); }

    .expiry-label {
      font-size: 11px; color: var(--muted); margin-top: 5px;
      font-family: var(--mono);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 50px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty p { font-size: 14px; line-height: 1.6; }

    /* ── Forms ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .form-card h3 {
      font-size: 14px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 14px;
    }
    label {
      display: block; font-size: 12px; color: var(--muted);
      margin-bottom: 5px; margin-top: 12px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    input, textarea {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      color: var(--text); font-family: var(--sans); font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent2); }
    textarea { font-family: var(--mono); font-size: 11px; resize: vertical; min-height: 90px; }

    .btn-primary {
      width: 100%; margin-top: 14px;
      background: linear-gradient(135deg, #1e3a5f 0%, #1d4ed8 100%);
      color: #bfdbfe; border: 1px solid #3b82f644;
      border-radius: 12px; padding: 13px;
      font-family: var(--mono); font-size: 13px; letter-spacing: 0.06em;
      cursor: pointer; transition: all 0.2s; font-weight: 700;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%); }

    /* ── Log ── */
    .log-entry {
      display: flex; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .log-entry:last-child { border: none; }
    .log-user { font-weight: 500; }
    .log-time { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .log-lock { font-size: 11px; color: var(--accent2); margin-top: 2px; }

    /* ── Bottom nav ── */
    .bottom-tabs {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      display: flex;
      background: #0a0a0fee; backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    }
    .tab-btn {
      flex: 1; background: none; border: none;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; padding: 6px;
      color: var(--muted); font-size: 10px; font-family: var(--sans);
      transition: color 0.2s;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn svg { width: 22px; height: 22px; stroke-width: 1.6; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 20px;
      font-size: 13px; white-space: nowrap;
      opacity: 0; transition: all 0.3s; pointer-events: none;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Animations ── */
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── Unlock animation overlay ── */
    .unlock-flash {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(circle at center, #4ade8033 0%, transparent 70%);
      opacity: 0; z-index: 50;
      transition: opacity 0.15s;
    }
    .unlock-flash.show { opacity: 1; }
  </style>
</head>
<body>

<div class="unlock-flash" id="flash"></div>

<div id="app">
  <header>
    <div class="logo">Smart<span>Lock</span></div>
    <div id="clock">--:--</div>
  </header>

  <!-- Locks tab -->
  <section id="tab-locks" class="active">
    <div id="lockList"></div>
  </section>

  <!-- Add token tab -->
  <section id="tab-add">
    <div class="form-card">
      <h3>Legg til adgangstoken</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:8px;">
        Lim inn token fra admin-verktøyet ditt (admin_keygen.py).
      </p>
      <label>Visningsnavn</label>
      <input type="text" id="inp-name" placeholder="F.eks. Hoveddør – Kontor">
      <label>Payload</label>
      <input type="text" id="inp-payload" placeholder="brukernavn:lås-id:timestamp" style="font-family:var(--mono);font-size:12px;">
      <label>Signatur (hex)</label>
      <textarea id="inp-sig" placeholder="3045022100..."></textarea>
      <button class="btn-primary" onclick="addToken()">Lagre nøkkel</button>
    </div>

    <div class="form-card" style="margin-top:8px;">
      <h3>Importer JSON</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:8px;">
        Lim inn direkte JSON-output fra admin_keygen.py.
      </p>
      <textarea id="inp-json" placeholder='{"payload":"...","signature":"...","username":"...","lock_id":"...","expires_human":"..."}'></textarea>
      <button class="btn-primary" onclick="importJSON()">Importer</button>
    </div>
  </section>

  <!-- Log tab -->
  <section id="tab-log">
    <div class="form-card">
      <h3>Lokal aktivitetslogg</h3>
      <div id="logList"><p style="color:var(--muted);font-size:13px;">Ingen aktivitet registrert ennå.</p></div>
    </div>
  </section>
</div>

<!-- Bottom nav -->
<nav class="bottom-tabs">
  <button class="tab-btn active" data-tab="locks" onclick="switchTab('locks',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Låser
  </button>
  <button class="tab-btn" data-tab="add" onclick="switchTab('add',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    Legg til
  </button>
  <button class="tab-btn" data-tab="log" onclick="switchTab('log',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    Logg
  </button>
</nav>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  SmartLock PWA – JavaScript
// ═══════════════════════════════════════════════════════════

const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const MAIN_CHAR    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const STATUS_CHAR  = "cba1d466-344c-4be3-ab3f-189f80dd7518";

// ── Lagring ──────────────────────────────────────────────────

function loadTokens() {
  return JSON.parse(localStorage.getItem('sl_tokens') || '[]');
}
function saveTokens(arr) {
  localStorage.setItem('sl_tokens', JSON.stringify(arr));
}
function loadLog() {
  return JSON.parse(localStorage.getItem('sl_log') || '[]');
}
function pushLog(entry) {
  const log = loadLog();
  log.unshift({ ...entry, localTime: new Date().toISOString() });
  localStorage.setItem('sl_log', JSON.stringify(log.slice(0, 200)));
}

// ── Clock ────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000); updateClock();

// ── Toast ────────────────────────────────────────────────────
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

// ── Flash ────────────────────────────────────────────────────
function flashGreen() {
  const el = document.getElementById('flash');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 600);
}

// ── Tab navigation ───────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'log') renderLog();
}

// ── Expiry helpers ───────────────────────────────────────────
function parseExpiry(payload) {
  try { return parseInt(payload.split(':')[2]); } catch { return 0; }
}
function expiryInfo(expiry) {
  const now = Math.floor(Date.now() / 1000);
  const total = expiry - (expiry - 86400); // assume 24h token from creation
  const left  = expiry - now;
  if (left <= 0) return { label: 'Utløpt', pct: 0, cls: 'expired' };
  if (left < 3600) return { label: `Utløper om ${Math.floor(left/60)}m`, pct: Math.min(100,(left/86400)*100), cls: 'warn' };
  const h = Math.floor(left / 3600);
  return { label: `Utløper om ${h}t`, pct: Math.min(100,(left/86400)*100), cls: '' };
}

// ── Render locks ─────────────────────────────────────────────
function renderLocks() {
  const tokens = loadTokens();
  const el = document.getElementById('lockList');

  if (tokens.length === 0) {
    el.innerHTML = `
      <div class="empty fade-in">
        <div class="empty-icon">🔒</div>
        <p>Ingen adgangsnøkler lagret.<br>Gå til <strong>Legg til</strong> for å importere din første nøkkel.</p>
      </div>`;
    return;
  }

  el.innerHTML = tokens.map((t, i) => {
    const expiry = parseExpiry(t.payload);
    const ei = expiryInfo(expiry);
    const username = t.payload.split(':')[0];
    const lockId   = t.payload.split(':')[1] || '?';
    return `
    <div class="lock-card fade-in">
      <div class="lock-header">
        <div>
          <div class="lock-name">${escHtml(t.name)}</div>
          <div class="lock-meta">${escHtml(username)}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="lock-id-badge">${escHtml(lockId)}</span>
          <button class="btn-del-lock" onclick="deleteToken(${i})" title="Slett">×</button>
        </div>
      </div>
      <div class="lock-status">
        <div class="status-dot" id="dot-${i}"></div>
        <span id="stat-${i}">Klar</span>
      </div>
      <div class="lock-actions">
        <button class="btn-unlock" id="btn-${i}" onclick="unlock(${i})">🔓 LÅS OPP</button>
        <button class="btn-sync" onclick="syncTime(${i})" title="Synkroniser klokke på ESP32">🕐</button>
      </div>
      <div class="expiry-bar">
        <div class="expiry-fill ${ei.cls}" style="width:${ei.pct}%"></div>
      </div>
      <div class="expiry-label">${ei.label}</div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(i, msg, cls = '') {
  const dot  = document.getElementById(`dot-${i}`);
  const stat = document.getElementById(`stat-${i}`);
  if (!dot || !stat) return;
  dot.className  = 'status-dot ' + cls;
  stat.textContent = msg;
}

// ── BLE unlock flow ──────────────────────────────────────────
async function unlock(index) {
  const tokens = loadTokens();
  const t = tokens[index];
  if (!t) return;

  // Sjekk utløp lokalt før vi prøver BLE
  const expiry = parseExpiry(t.payload);
  if (expiry > 0 && expiry < Math.floor(Date.now() / 1000)) {
    setStatus(index, 'Token utløpt!', 'error');
    toast('⛔ Nøkkelen er utløpt. Hent en ny fra admin.');
    return;
  }

  if (!navigator.bluetooth) {
    toast('❌ Web Bluetooth ikke støttet. Bruk Chrome eller Bluefy (iOS).');
    return;
  }

  const btn = document.getElementById(`btn-${index}`);
  btn.disabled = true;

  try {
    setStatus(index, 'Søker etter lås…', 'working');

    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });

    setStatus(index, 'Kobler til…', 'working');
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const mainChar   = await service.getCharacteristic(MAIN_CHAR);

    // Abonner på status-notifikasjoner fra ESP32
    let statusChar;
    try {
      statusChar = await service.getCharacteristic(STATUS_CHAR);
      await statusChar.startNotifications();
      statusChar.addEventListener('characteristicvaluechanged', e => {
        const msg = new TextDecoder().decode(e.target.value);
        handleESPStatus(index, msg);
      });
    } catch { /* Gammel firmware uten status-char – fortsett likevel */ }

    // Send token
    setStatus(index, 'Sender nøkkel…', 'working');
    const data = `${t.payload}|${t.signature}`;
    await mainChar.writeValue(new TextEncoder().encode(data));

    // Vent på status (hvis ikke notifikasjoner, anta suksess etter 2s)
    if (!statusChar) {
      setTimeout(() => {
        setStatus(index, '✅ Åpnet!', 'open');
        flashGreen();
        pushLog({ action: 'unlock', name: t.name, payload: t.payload });
        setTimeout(() => { device.gatt.disconnect(); setStatus(index, 'Klar'); }, 3500);
      }, 1500);
    } else {
      // La notifikasjons-handleren ta seg av resten
      setTimeout(() => {
        if (device.gatt.connected) device.gatt.disconnect();
      }, 6000);
    }
  } catch (err) {
    console.error(err);
    const msg = err.name === 'NotFoundError' ? 'Ingen lås funnet' :
                err.name === 'NetworkError'  ? 'Tilkobling feilet' : 'Feil: ' + err.message;
    setStatus(index, msg, 'error');
    toast('⚠️ ' + msg);
  } finally {
    btn.disabled = false;
  }
}

function handleESPStatus(index, status) {
  const map = {
    'OPEN':        ['✅ Åpnet!',          'open'],
    'CLOSED':      ['🔒 Klar',           ''],
    'READY':       ['Klar',              ''],
    'VERIFYING':   ['Verifiserer…',      'working'],
    'INVALID_SIG': ['❌ Ugyldig signatur','error'],
    'EXPIRED':     ['⏰ Utløpt',         'error'],
    'WRONG_LOCK':  ['❌ Feil lås-ID',    'error'],
    'FORMAT_ERR':  ['❌ Formatfeil',     'error'],
    'TIME_OK':     ['⏱ Tid synkronisert',''],
    'TIME_ERR':    ['❌ Tidsfeil',       'error'],
  };
  const [msg, cls] = map[status] || ['Status: ' + status, ''];
  setStatus(index, msg, cls);
  if (status === 'OPEN') {
    flashGreen();
    const tokens = loadTokens();
    pushLog({ action: 'unlock', name: tokens[index]?.name, payload: tokens[index]?.payload, esp_status: status });
    renderLog();
  }
}

// ── Tidssync ─────────────────────────────────────────────────
async function syncTime(index) {
  if (!navigator.bluetooth) { toast('Web Bluetooth ikke tilgjengelig'); return; }
  try {
    setStatus(index, 'Kobler til for tidssync…', 'working');
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const char    = await service.getCharacteristic(MAIN_CHAR);

    const ts   = Math.floor(Date.now() / 1000);
    const cmd  = `TIMESYNC:${ts}`;
    await char.writeValue(new TextEncoder().encode(cmd));

    setStatus(index, '⏱ Tid sendt!', '');
    toast('🕐 Klokkeslett synkronisert med ESP32');
    setTimeout(() => { device.gatt.disconnect(); setStatus(index, 'Klar'); }, 1500);
  } catch (e) {
    setStatus(index, 'Feil under sync', 'error');
  }
}

// ── Legg til token ───────────────────────────────────────────
function addToken() {
  const name    = document.getElementById('inp-name').value.trim();
  const payload = document.getElementById('inp-payload').value.trim();
  const sig     = document.getElementById('inp-sig').value.trim().replace(/\s+/g, '');

  if (!name || !payload || !sig) { toast('Fyll inn alle feltene'); return; }
  if (!payload.match(/^[^:]+:[^:]+:\d+$/)) {
    toast('⚠️ Payload-format: brukernavn:lås-id:timestamp'); return;
  }

  const tokens = loadTokens();
  tokens.push({ name, payload, signature: sig, added: Date.now() });
  saveTokens(tokens);
  renderLocks();
  toast('✅ Nøkkel lagret!');
  ['inp-name','inp-payload','inp-sig'].forEach(id => document.getElementById(id).value = '');
  switchTab('locks', document.querySelector('.tab-btn'));
}

function importJSON() {
  const raw = document.getElementById('inp-json').value.trim();
  try {
    const data = JSON.parse(raw);
    if (!data.payload || !data.signature) throw new Error('Mangler payload eller signatur');
    const name = data.username
      ? `${data.username} – ${data.lock_id || '?'}`
      : (data.lock_id || 'Ukjent lås');
    const tokens = loadTokens();
    tokens.push({ name, payload: data.payload, signature: data.signature, added: Date.now() });
    saveTokens(tokens);
    renderLocks();
    toast('✅ Importert: ' + name);
    document.getElementById('inp-json').value = '';
    switchTab('locks', document.querySelector('.tab-btn'));
  } catch (e) {
    toast('❌ Ugyldig JSON: ' + e.message);
  }
}

// ── Slett token ──────────────────────────────────────────────
function deleteToken(i) {
  if (!confirm('Slett denne nøkkelen?')) return;
  const tokens = loadTokens();
  tokens.splice(i, 1);
  saveTokens(tokens);
  renderLocks();
}

// ── Logg ─────────────────────────────────────────────────────
function renderLog() {
  const log = loadLog();
  const el  = document.getElementById('logList');
  if (log.length === 0) {
    el.innerHTML = '<p style="color:var(--muted);font-size:13px;">Ingen aktivitet registrert ennå.</p>';
    return;
  }
  el.innerHTML = log.map(e => {
    const d    = new Date(e.localTime);
    const time = d.toLocaleString('nb-NO', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    const lockId = e.payload ? e.payload.split(':')[1] : '?';
    const user   = e.payload ? e.payload.split(':')[0] : '?';
    return `
      <div class="log-entry">
        <div>
          <div class="log-user">${escHtml(e.name || user)}</div>
          <div class="log-lock">${escHtml(lockId)}</div>
        </div>
        <div class="log-time">${time}</div>
      </div>`;
  }).join('');
}

// ── Service Worker registrering ──────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Init ─────────────────────────────────────────────────────
renderLocks();
</script>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080b12">
  <title>SmartLock</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
    :root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--accent:#4ade80;--accent2:#22d3ee;--danger:#f87171;--warn:#fbbf24;--text:#e2e8f0;--muted:#64748b;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E")}
    #app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 90px}
    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0}
    .logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase}
    .logo span{color:var(--muted)}
    .sync-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:6px;transition:color .2s;font-family:var(--mono)}
    .sync-btn:hover{color:var(--accent2)}
    .sync-btn.spin{animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Offline banner */
    .offline-bar{display:flex;align-items:center;gap:8px;background:#fbbf2412;border:1px solid #fbbf2430;border-radius:10px;margin:12px 16px 0;padding:9px 14px;font-size:12px;color:var(--warn)}
    /* Nav */
    nav{display:flex;gap:2px;margin:16px 16px 0;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border)}
    nav button{flex:1;background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 4px;border-radius:9px;cursor:pointer;transition:all .2s}
    nav button.active{background:var(--border);color:var(--text)}
    /* Sections */
    section{display:none;padding:12px 16px}
    section.active{display:block}
    /* Lock card */
    .lock-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;transition:border-color .3s}
    .lock-card.open{border-color:#4ade8060}
    .lock-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0;transition:opacity .3s}
    .lock-card.open::before{opacity:1}
    .lock-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .lock-name{font-size:17px;font-weight:600}
    .lock-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .lock-badge{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--border);padding:3px 8px;border-radius:20px}
    /* Status */
    .status-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;min-height:20px;font-family:var(--mono);font-size:12px}
    .status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
    .status-dot.open{background:var(--accent);box-shadow:0 0 8px var(--accent)}
    .status-dot.error{background:var(--danger)}
    .status-dot.working{background:var(--warn);animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    /* Expiry */
    .expiry-label{font-size:11px;color:var(--muted);margin-bottom:14px;font-family:var(--mono)}
    .expiry-label.warn{color:var(--warn)}
    .expiry-label.expired{color:var(--danger)}
    .expiry-bar{height:3px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:12px}
    .expiry-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .5s}
    .expiry-fill.warn{background:var(--warn)}
    .expiry-fill.expired{background:var(--danger)}
    /* Buttons */
    .btn-row{display:flex;gap:8px}
    .btn-unlock{flex:1;background:linear-gradient(135deg,#166534,#15803d);color:#dcfce7;border:1px solid #22c55e44;border-radius:12px;padding:13px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .2s}
    .btn-unlock:hover{background:linear-gradient(135deg,#15803d,#16a34a);transform:translateY(-1px)}
    .btn-unlock:active{transform:none}
    .btn-unlock:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-icon{background:var(--border);color:var(--accent2);border:1px solid #0e7490;border-radius:12px;padding:13px 14px;cursor:pointer;font-size:16px;transition:all .2s}
    .btn-icon:hover{background:#0c4a6e44}
    /* Log */
    .log-entry{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
    .log-entry:last-child{border:none}
    .log-name{font-weight:500}
    .log-lock{font-size:11px;color:var(--accent2);margin-top:2px}
    .log-time{font-family:var(--mono);font-size:11px;color:var(--muted)}
    /* Profile */
    .profile-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
    .profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:.4}
    /* Login */
    .login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px}
    .login-logo{font-family:var(--mono);font-size:20px;color:var(--accent);text-align:center;margin-bottom:6px;letter-spacing:.1em}
    .login-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:32px;letter-spacing:.04em}
    .form-lbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:14px}
    .form-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s}
    .form-inp:focus{border-color:var(--accent2)}
    .btn-main{width:100%;margin-top:18px;background:linear-gradient(135deg,#166534,#15803d);color:#dcfce7;border:1px solid #22c55e44;border-radius:12px;padding:14px;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.08em}
    .btn-main:hover{background:linear-gradient(135deg,#15803d,#16a34a)}
    .btn-main:disabled{opacity:.5;cursor:not-allowed}
    .err-msg{background:#f8717112;border:1px solid #f8717130;border-radius:10px;padding:11px 14px;font-size:13px;color:var(--danger);margin-top:12px}
    /* Bottom tabs */
    .bottom-tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:#0a0a0fee;backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom))}
    .tab-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px;color:var(--muted);font-size:10px;font-family:var(--sans);transition:color .2s}
    .tab-btn.active{color:var(--accent)}
    .tab-btn svg{width:22px;height:22px;stroke-width:1.6}
    /* Toast */
    #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;white-space:nowrap;opacity:0;transition:all .3s;pointer-events:none;z-index:100}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    /* Flash */
    .success-flash{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at center,#4ade8033,transparent 70%);opacity:0;z-index:50;transition:opacity .15s}
    .success-flash.show{opacity:1}
    /* Empty */
    .empty{text-align:center;padding:50px 20px;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
    .empty p{font-size:14px;line-height:1.6}
    .fade-in{animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div id="toast"></div>
<div id="root"></div>

<script>
// ── CONFIG – FYLL INN DINE SUPABASE-VERDIER ──────────────────
const SUPABASE_URL     = 'https://cqsybqwifiztvcfocokb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxc3licXdpZml6dHZjZm9jb2tiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODA5MzYsImV4cCI6MjA5MDc1NjkzNn0.5M-nMoGBtcbEK3aIkeyCJPGnRM7J5i3hzx60DypFDYI';
const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/sign-token`;

// BLE UUIDs
const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const MAIN_CHAR    = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
const STATUS_CHAR  = 'cba1d466-344c-4be3-ab3f-189f80dd7518';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── IndexedDB offline storage ─────────────────────────────────
const DB_NAME = 'smartlock_db', DB_VER = 1;
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('tokens')) d.createObjectStore('tokens', { keyPath: 'lockId' });
      if (!d.objectStoreNames.contains('log'))    d.createObjectStore('log',    { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = () => rej(req.error);
  });
}

async function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = key !== undefined ? tx.objectStore(store).get(key) : tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

async function dbPut(store, value) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(value);
    tx.oncomplete = () => res();
    tx.onerror    = () => rej(tx.error);
  });
}

async function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => res();
    tx.onerror    = () => rej(tx.error);
  });
}

// ── Hjelpefunksjoner ─────────────────────────────────────────
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function flash() {
  const el = document.getElementById('flash');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 600);
}

function expiryInfo(expiresAt) {
  const left = new Date(expiresAt) - Date.now();
  const secs = Math.floor(left / 1000);
  if (secs <= 0) return { label: 'Utløpt', cls: 'expired', pct: 0 };
  const h = Math.floor(secs / 3600);
  const d = Math.floor(secs / 86400);
  return {
    label: d > 0 ? `${d}d igjen` : `${h}t igjen`,
    cls:   secs < 3600 ? 'warn' : '',
    pct:   Math.min(100, (secs / 86400) * 100),
  };
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString('nb-NO', {
    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
  });
}

// ── BLE helpers ───────────────────────────────────────────────
async function disconnectAndForget(device) {
  try { if (device.gatt.connected) await device.gatt.disconnect(); } catch {}
  try { await device.forget(); } catch {}
}

async function bleUnlock(token, onStatus) {
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ services: [SERVICE_UUID] }]
  });
  device._done = false;
  device.addEventListener('gattserverdisconnected', () => {
    if (!device._done) onStatus('error', 'Mistet tilkobling');
  });

  onStatus('working', 'Kobler til…');
  let server;
  try { server = await device.gatt.connect(); }
  catch { await new Promise(r => setTimeout(r, 800)); server = await device.gatt.connect(); }

  const service  = await server.getPrimaryService(SERVICE_UUID);
  const mainChar = await service.getCharacteristic(MAIN_CHAR);

  let statusChar;
  try {
    statusChar = await service.getCharacteristic(STATUS_CHAR);
    await statusChar.startNotifications();
  } catch {}

  onStatus('working', 'Sender nøkkel…');
  const data = `${token.payload}|${token.signature}`;
  await mainChar.writeValue(new TextEncoder().encode(data));

  const result = await new Promise(resolve => {
    if (!statusChar) { setTimeout(() => resolve('OPEN'), 1500); return; }
    const done = ['OPEN','CLOSED','INVALID_SIG','EXPIRED','WRONG_LOCK','FORMAT_ERR'];
    statusChar.addEventListener('characteristicvaluechanged', e => {
      const msg = new TextDecoder().decode(e.target.value).trim();
      onStatus('working', msg);
      if (done.includes(msg)) resolve(msg);
    });
    setTimeout(() => resolve('TIMEOUT'), 8000);
  });

  device._done = true;
  await disconnectAndForget(device);
  return result;
}

async function bleSyncTime(lockId, onStatus) {
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ services: [SERVICE_UUID] }]
  });
  onStatus('Kobler til…');
  const server  = await device.gatt.connect();
  const service = await server.getPrimaryService(SERVICE_UUID);
  const char    = await service.getCharacteristic(MAIN_CHAR);
  const ts      = Math.floor(Date.now() / 1000);
  await char.writeValue(new TextEncoder().encode(`TIMESYNC:${ts}`));
  onStatus('Tid synkronisert ✓');
  setTimeout(async () => {
    try { await device.gatt.disconnect(); } catch {}
    try { await device.forget(); } catch {}
  }, 1000);
}

// ── App state ─────────────────────────────────────────────────
let state = {
  user: null, session: null,
  tokens: [],        // fra IndexedDB
  statuses: {},      // { lockId: { cls, label } }
  tab: 'locks',
  syncing: false,
  online: navigator.onLine,
  log: [],
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function setStatus(lockId, cls, label) {
  state.statuses = { ...state.statuses, [lockId]: { cls, label } };
  render();
}

// ── Supabase sync ─────────────────────────────────────────────
async function syncTokens() {
  if (!state.session || !navigator.onLine) {
    toast('⚠️ Ikke tilkoblet – bruker lagrede nøkler'); return;
  }
  setState({ syncing: true });
  try {
    const res = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${state.session.access_token}`,
        'Content-Type': 'application/json',
      },
    });
    const { tokens, error } = await res.json();
    if (error) throw new Error(error);

    // Lagre tokens i IndexedDB
    for (const t of tokens) await dbPut('tokens', t);

    // Slett tokens som ikke lenger er i svaret (tilgang trukket tilbake)
    const existing = await dbGet('tokens');
    for (const e of existing) {
      if (!tokens.find(t => t.lockId === e.lockId)) await dbDelete('tokens', e.lockId);
    }

    const all = await dbGet('tokens');
    setState({ tokens: all, syncing: false });
    toast(`✓ ${tokens.length} nøkkel${tokens.length !== 1 ? 'er' : ''} synkronisert`);

    // Logg sync
    await sb.from('audit_log').insert(
      tokens.map(t => ({ user_id: state.user.id, action: 'sync', details: { lock_id: t.lockId } }))
    );
  } catch (err) {
    setState({ syncing: false });
    toast('Synkfeil: ' + err.message);
  }
}

// ── Unlock handler ────────────────────────────────────────────
async function handleUnlock(token) {
  if (!navigator.bluetooth) {
    toast('Web Bluetooth ikke støttet – bruk Chrome eller Bluefy'); return;
  }
  const exp = new Date(token.expiresAt);
  if (exp < new Date()) {
    setStatus(token.lockId, 'error', '⏰ Nøkkel utløpt');
    toast('Nøkkelen er utløpt – sync for å oppdatere'); return;
  }
  try {
    const result = await bleUnlock(token, (cls, label) => setStatus(token.lockId, cls, label));
    if (result === 'OPEN') {
      setStatus(token.lockId, 'open', '✓ Åpnet!');
      flash();
      const logEntry = { lockId: token.lockId, lockName: token.lockName, ts: Date.now() };
      await dbPut('log', { ...logEntry, id: Date.now() });
      // Logg til Supabase hvis online
      if (navigator.onLine && state.user) {
        await sb.from('audit_log').insert({
          user_id: state.user.id, action: 'unlock',
          details: { lock_id: token.lockId, lock_name: token.lockName },
        });
      }
      setTimeout(() => setStatus(token.lockId, '', 'Klar'), 3500);
    } else {
      const msgs = { INVALID_SIG:'Ugyldig signatur', EXPIRED:'Utløpt', WRONG_LOCK:'Feil lås', TIMEOUT:'Tidsavbrudd' };
      setStatus(token.lockId, 'error', msgs[result] || result);
    }
  } catch (err) {
    const msg = err.name === 'NotFoundError' ? 'Ingen lås funnet' :
                err.name === 'NetworkError'  ? 'Tilkobling feilet' : 'Feil: ' + err.message;
    setStatus(token.lockId, 'error', msg);
    toast('⚠️ ' + msg);
  }
}

// ── Login ─────────────────────────────────────────────────────
async function handleLogin(email, pass) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) return error.message;
  setState({ user: data.user, session: data.session });
  await loadOfflineData();
  await syncTokens();
  return null;
}

async function handleLogout() {
  await sb.auth.signOut();
  setState({ user: null, session: null, tokens: [], log: [] });
}

async function loadOfflineData() {
  const tokens = await dbGet('tokens') || [];
  const log    = (await dbGet('log') || []).sort((a,b) => b.ts - a.ts).slice(0, 100);
  setState({ tokens, log });
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  if (!state.user) { root.innerHTML = renderLogin(); return; }
  root.innerHTML = renderApp();
  attachEvents();
}

function renderLogin() {
  return `
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">SmartLock</div>
      <div class="login-sub">Logg inn for å få tilgang til låsene dine</div>
      <div id="login-err"></div>
      <label class="form-lbl">E-post</label>
      <input class="form-inp" id="l-email" type="email" placeholder="din@epost.no" autocomplete="email">
      <label class="form-lbl">Passord</label>
      <input class="form-inp" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn-main" id="l-btn" onclick="submitLogin()">Logg inn</button>
    </div>
  </div>`;
}

function renderApp() {
  const offlineBar = !state.online
    ? `<div class="offline-bar">⚠️ Offline – bruker lagrede nøkler</div>` : '';

  return `
  <div id="app">
    <div class="header">
      <div class="logo">Smart<span>Lock</span></div>
      <button class="sync-btn ${state.syncing?'spinning':''}" onclick="syncTokens()" title="Synkroniser">↻</button>
    </div>
    ${offlineBar}
    <nav>
      <button class="${state.tab==='locks'?'active':''}" onclick="switchTab('locks')">🔒 Låser</button>
      <button class="${state.tab==='log'?'active':''}"   onclick="switchTab('log')">📋 Logg</button>
      <button class="${state.tab==='profile'?'active':''}" onclick="switchTab('profile')">👤 Profil</button>
    </nav>

    <section class="${state.tab==='locks'?'active':''}">
      ${renderLocks()}
    </section>
    <section class="${state.tab==='log'?'active':''}">
      ${renderLog()}
    </section>
    <section class="${state.tab==='profile'?'active':''}">
      ${renderProfile()}
    </section>
  </div>`;
}

function renderLocks() {
  if (state.tokens.length === 0) return `
    <div class="empty fade-in">
      <div class="empty-icon">🔒</div>
      <p>Ingen nøkler tilgjengelig.<br>Administrator må tildele deg tilgang.</p>
      ${state.online ? `<button onclick="syncTokens()" style="margin-top:16px;background:var(--border);color:var(--text);border:none;border-radius:10px;padding:10px 20px;cursor:pointer;font-size:13px">Synkroniser nå</button>` : ''}
    </div>`;

  return state.tokens.map(t => {
    const st  = state.statuses[t.lockId] || { cls: '', label: 'Klar' };
    const exp = expiryInfo(t.expiresAt);
    const isOpen    = st.cls === 'open';
    const isWorking = st.cls === 'working';
    const isError   = st.cls === 'error';
    const dotCls    = isOpen ? 'open' : isWorking ? 'working' : isError ? 'error' : '';
    const txtColor  = isOpen ? 'var(--accent)' : isWorking ? 'var(--warn)' : isError ? 'var(--danger)' : 'var(--muted)';
    return `
    <div class="lock-card ${isOpen?'open':''} fade-in">
      <div class="lock-top-bar"></div>
      <div class="lock-head">
        <div>
          <div class="lock-name">${t.lockName}</div>
          <div class="lock-sub">${t.label || t.lockId}</div>
        </div>
        <span class="lock-badge">${t.lockId}</span>
      </div>
      <div class="status-row">
        <div class="dot ${dotCls}"></div>
        <span class="status-txt" style="color:${txtColor}">${st.label}</span>
      </div>
      <div class="expiry-info ${exp.cls}">${exp.label}</div>
      <div class="btn-row">
        <button class="btn-unlock" ${isWorking?'disabled':''} onclick="handleUnlock(${JSON.stringify(t).replace(/"/g,'&quot;')})">
          ${isWorking ? '···' : '🔓  LÅS OPP'}
        </button>
        <button class="btn-sync" onclick="bleSyncTime('${t.lockId}', msg => setStatus('${t.lockId}','',''+msg))" title="Synkroniser klokke">🕐</button>
      </div>
      <div class="prog-bar"><div class="prog-fill ${exp.cls}" style="width:${exp.pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderLog() {
  if (state.log.length === 0) return `<div class="empty"><div class="empty-icon">📋</div><p>Ingen aktivitet ennå</p></div>`;
  return state.log.map(e => `
    <div class="log-row">
      <div>
        <div class="log-name">${e.lockName || e.lockId}</div>
        <div class="log-lock">${e.lockId}</div>
      </div>
      <div class="log-time">${fmtTime(e.ts)}</div>
    </div>`).join('');
}

function renderProfile() {
  return `
  <div class="lock-card fade-in">
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Innlogget som</div>
    <div style="font-size:16px;font-weight:600;margin-bottom:16px">${state.user.email}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px">
      ${state.tokens.length} nøkkel${state.tokens.length !== 1 ? 'er' : ''} lagret offline
    </div>
    <button onclick="syncTokens()" style="width:100%;background:var(--border);color:var(--text);border:none;border-radius:12px;padding:13px;cursor:pointer;font-size:14px;margin-bottom:10px">
      ↻ Synkroniser nøkler
    </button>
    <button onclick="handleLogout()" style="width:100%;background:#f8717115;color:var(--danger);border:1px solid var(--danger)30;border-radius:12px;padding:13px;cursor:pointer;font-size:14px">
      Logg ut
    </button>
  </div>`;
}

function attachEvents() {}

function switchTab(tab) { setState({ tab }); }

async function submitLogin() {
  const email = document.getElementById('l-email')?.value;
  const pass  = document.getElementById('l-pass')?.value;
  const btn   = document.getElementById('l-btn');
  if (!email || !pass) return;
  if (btn) btn.disabled = true;
  const err = await handleLogin(email, pass);
  if (err) {
    const el = document.getElementById('login-err');
    if (el) el.innerHTML = `<div class="err-msg">${err}</div>`;
    if (btn) btn.disabled = false;
  }
}

// ── Offline/online events ─────────────────────────────────────
window.addEventListener('online',  () => { setState({ online: true });  syncTokens(); });
window.addEventListener('offline', () => { setState({ online: false }); });

// Synkroniser automatisk når fanen blir aktiv igjen
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.user && navigator.onLine) syncTokens();
});

// ── Init ──────────────────────────────────────────────────────
(async () => {
  await openDB();

  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    setState({ user: session.user, session });
    await loadOfflineData();
    if (navigator.onLine) await syncTokens();
  } else {
    render();
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
})();
</script>
</body>
</html>
